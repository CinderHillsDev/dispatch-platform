# Dispatch SMTP Relay - the default single-container stack, backed by bundled SQLite.
#
#   docker compose up --build        # build + run
#   open https://localhost:8420      # dashboard (self-signed cert; log in with the ADMIN password below)
#
# There is no database service here on purpose. SQLite lives in the dispatch-data volume, which means one
# container, one volume to back up, and no database credentials to manage. Every writer is a thread inside
# this one process, which is the shape SQLite's single-writer model handles well - see docs/database.md.
#
# To run against a database server you already have instead, layer the override file:
#
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up --build
#
services:
  dispatch:
    build: .
    container_name: dispatch
    environment:
      # The only two bootstrap settings (spec 12.1); everything else is managed in the dashboard.
      ConnectionStrings__DispatchLog: "Data Source=/app/.dispatch-data/dispatch.db"
      AdminPassword: "Dev_Admin_Passw0rd!"
    ports:
      - "8420:8420"   # dashboard
      - "8025:8025"   # ingestion API
      - "25:25"       # SMTP  (if host port 25 is busy, remap e.g. "2525:25")
      - "587:587"     # SMTP submission
    volumes:
      - dispatch-data:/app/.dispatch-data     # the SQLite database - this is what to back up
      - dispatch-spool:/app/.dispatch-spool
      - dispatch-logs:/var/log/dispatch
    restart: unless-stopped

volumes:
  dispatch-data:
  dispatch-spool:
  dispatch-logs:
