name: Pages

# Builds the Astro + Starlight documentation site (website/) and publishes it to GitHub Pages.
# The site includes the marketing landing page (website/src/pages/index.astro) and the docs.
# Enable once in repo Settings → Pages → Source = "GitHub Actions".
on:
  push:
    # TODO(after merge): drop the feature branch — main is the canonical Pages source.
    branches: [main, feat/relay-engine-web-providers]
    paths:
      - website/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
