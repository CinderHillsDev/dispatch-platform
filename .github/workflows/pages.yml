name: Pages

# Publishes the static landing page (index.html, Tailwind via CDN) to GitHub Pages — no Jekyll/theme.
# Enable once in repo Settings → Pages → Source = "GitHub Actions".
on:
  push:
    # TODO(after merge): drop the feature branch — main is the canonical Pages source.
    branches: [main, feat/relay-engine-web-providers]
    paths:
      - index.html
      - docs/images/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static site
        run: |
          mkdir -p _site/docs/images
          cp index.html _site/index.html
          cp docs/images/dashboard.png _site/docs/images/dashboard.png
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
