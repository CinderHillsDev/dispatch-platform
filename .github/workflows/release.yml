name: Release

# Cut a release by pushing a semver tag:
#   git tag v1.2.3 && git push origin v1.2.3
#
# This builds the distributable artifacts, stamps them with the tag version, optionally Authenticode-signs
# the Windows installer via Azure Artifact Signing, and publishes a GitHub Release with:
#   - DispatchSetup.exe          the single-file Windows installer (embeds the signed MSI + chains SQL Express)
#   - dispatch-<ver>-linux.tar.gz       universal Linux bundle (x64 + arm64, self-contained)
#   - SHA256SUMS                 checksums for all of the above
#
# Code signing is OPT-IN and dormant until you provision Azure Artifact Signing (renamed from Trusted
# Signing, Jan 2026) and set these repo settings:
#   Variables: AZURE_SIGNING_ENDPOINT (e.g. https://eus.codesigning.azure.net/),
#              AZURE_SIGNING_ACCOUNT, AZURE_CERT_PROFILE
#   Secrets:   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID   (federated/OIDC service principal)
# Until AZURE_SIGNING_ACCOUNT is set, the release still publishes — just unsigned.

on:
  push:
    tags:
      - "v*"
  # Allow a dry run against the current ref without tagging (publishes a draft prerelease).
  workflow_dispatch:
    inputs:
      version:
        description: "Version for a manual dry-run build (e.g. 0.0.0-test)"
        type: string
        default: "0.0.0-dryrun"

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # Azure OIDC login for signing
  packages: write   # push the container image to GHCR

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then v="${GITHUB_REF_NAME#v}"; else v="${{ inputs.version }}"; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building version $v"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Dispatch.UI/package-lock.json

      - name: Build + embed the web UI
        shell: pwsh
        run: |
          Push-Location src/Dispatch.UI; npm ci; npm run build; Pop-Location
          Remove-Item -Recurse -Force src/Dispatch.Web/wwwroot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force src/Dispatch.Web/wwwroot | Out-Null
          Copy-Item -Recurse -Force src/Dispatch.UI/dist/* src/Dispatch.Web/wwwroot/
          if (-not (Test-Path src/Dispatch.Web/wwwroot/index.html)) { throw "embedded UI missing index.html" }

      - name: Publish the service
        # Self-contained: bundle the .NET runtime so the service runs on a clean Windows box without a
        # separately-installed .NET 10 runtime (the bundle does not chain one). Matches the Linux build.
        run: dotnet publish src/Dispatch.Service -c Release -r win-x64 --self-contained true -p:Version=${{ steps.ver.outputs.version }} -o installer/windows/publish

      - name: Install the WiX toolset
        shell: pwsh
        env:
          WIX_VERSION: "6.0.2"
        run: |
          dotnet tool install --global wix --version $env:WIX_VERSION
          wix extension add -g "WixToolset.Firewall.wixext/$env:WIX_VERSION"
          wix extension add -g "WixToolset.BootstrapperApplications.wixext/$env:WIX_VERSION"
          wix extension add -g "WixToolset.Util.wixext/$env:WIX_VERSION"

      - name: Build the MSI
        working-directory: installer/windows
        run: wix build Dispatch.wxs -arch x64 -d PublishDir=publish -d Version=${{ steps.ver.outputs.version }} -ext WixToolset.Firewall.wixext -o Dispatch.msi

      # --- Sign the MSI (opt-in) ----------------------------------------------------------------
      - name: Azure login (signing)
        if: ${{ vars.AZURE_SIGNING_ACCOUNT != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign the MSI
        if: ${{ vars.AZURE_SIGNING_ACCOUNT != '' }}
        uses: azure/trusted-signing-action@v0.5
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/installer/windows
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build the SQL Express launcher
        run: dotnet build installer/windows/sql-express/SqlExpressLauncher.csproj -c Release

      - name: Build the bundle
        working-directory: installer/windows
        shell: pwsh
        run: |
          wix build bundle/Bundle.wxs -d Version=${{ steps.ver.outputs.version }} `
            -ext WixToolset.BootstrapperApplications.wixext -ext WixToolset.Util.wixext `
            -bindpath "SqlLauncher=sql-express/bin/Release/net472" -bindpath "Msi=." -o DispatchSetup.exe

      # --- Sign the Burn bundle (opt-in) --------------------------------------------------------
      # A Burn bundle has an attached engine; the engine must be signed too, so detach it, sign it,
      # reattach, then sign the final bundle (WiX-recommended; otherwise UAC flags the inner engine).
      # installer/windows holds other .exe files (publish/, sql-express/), so each Azure sign step
      # targets a folder containing ONLY the one file to sign, and we copy the result back in place.
      - name: Detach the bundle engine
        if: ${{ vars.AZURE_SIGNING_ACCOUNT != '' }}
        working-directory: installer/windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force engine | Out-Null
          wix burn detach DispatchSetup.exe -engine engine/engine.exe

      - name: Sign the engine
        if: ${{ vars.AZURE_SIGNING_ACCOUNT != '' }}
        uses: azure/trusted-signing-action@v0.5
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/installer/windows/engine
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Reattach the signed engine + stage bundle for signing
        if: ${{ vars.AZURE_SIGNING_ACCOUNT != '' }}
        working-directory: installer/windows
        shell: pwsh
        run: |
          wix burn reattach DispatchSetup.exe -engine engine/engine.exe -o DispatchSetup.exe
          New-Item -ItemType Directory -Force bundlesign | Out-Null
          Copy-Item -Force DispatchSetup.exe bundlesign/DispatchSetup.exe

      - name: Sign the bundle
        if: ${{ vars.AZURE_SIGNING_ACCOUNT != '' }}
        uses: azure/trusted-signing-action@v0.5
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/installer/windows/bundlesign
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Put the signed bundle back in place
        if: ${{ vars.AZURE_SIGNING_ACCOUNT != '' }}
        working-directory: installer/windows
        shell: pwsh
        run: Copy-Item -Force bundlesign/DispatchSetup.exe DispatchSetup.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows
          # DispatchSetup.exe is the single distributable — it embeds the (signed) MSI and chains SQL Express.
          path: installer/windows/DispatchSetup.exe
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then v="${GITHUB_REF_NAME#v}"; else v="${{ inputs.version }}"; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Dispatch.UI/package-lock.json

      - name: Build + embed the web UI
        run: |
          ( cd src/Dispatch.UI && npm ci && npm run build )
          rm -rf src/Dispatch.Web/wwwroot
          mkdir -p src/Dispatch.Web/wwwroot
          cp -r src/Dispatch.UI/dist/* src/Dispatch.Web/wwwroot/
          test -f src/Dispatch.Web/wwwroot/index.html || { echo "embedded UI missing index.html"; exit 1; }

      - name: Publish self-contained (x64 + arm64)
        run: |
          v=${{ steps.ver.outputs.version }}
          dotnet publish src/Dispatch.Service -c Release -r linux-x64   --self-contained true -p:Version=$v -o publish/x64
          dotnet publish src/Dispatch.Service -c Release -r linux-arm64 --self-contained true -p:Version=$v -o publish/arm64

      - name: Assemble the universal Linux tarball
        run: |
          ver="${{ steps.ver.outputs.version }}"
          stage="dispatch-${ver}-linux"
          mkdir -p "staging/${stage}/bin-x64" "staging/${stage}/bin-arm64"
          cp -r publish/x64/.   "staging/${stage}/bin-x64/"
          cp -r publish/arm64/. "staging/${stage}/bin-arm64/"
          cp installer/linux/install.sh "staging/${stage}/install.sh"
          cp installer/linux/dispatch.service "staging/${stage}/dispatch.service"
          chmod +x "staging/${stage}/install.sh" \
            "staging/${stage}/bin-x64/Dispatch.Service" "staging/${stage}/bin-arm64/Dispatch.Service"
          cat > "staging/${stage}/README.txt" <<EOF
          Dispatch SMTP Relay ${ver} — Linux (universal: x64 + arm64, self-contained; no .NET SDK required).

          install.sh auto-detects your CPU arch (uses bin-x64 or bin-arm64) — no flags needed:
            sudo ./install.sh --install-sql --sa-password '<StrongSaPassw0rd!>' --admin-password '<DashboardPassword!>'

          On arm64, --install-sql runs Azure SQL Edge in a container (SQL Server is amd64-only).
          Or use an existing SQL Server / Azure SQL:
            sudo ./install.sh --sql-connection 'Server=...;Database=DispatchLog;User Id=...;Password=...;TrustServerCertificate=True;Encrypt=True' --admin-password '<DashboardPassword!>'

          Then open https://localhost:8420 (self-signed cert) and log in with the admin password you set.
          EOF
          tar -czf "${stage}.tar.gz" -C staging "${stage}"
          ls -lh "${stage}.tar.gz"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux
          path: dispatch-*-linux.tar.gz
          if-no-files-found: error

      # Per-arch upgrade bundles for the web-UI self-update: the self-contained payload tarball, a
      # manifest (version/arch/sha256/minFromVersion), and a detached RSA/SHA-256 signature over the
      # manifest. The in-app verifier (UpdateBundleVerifier) authenticates the signature with the embedded
      # public key, then checks the payload's sha256 against the manifest. Signing is gated on the secret;
      # without it the bundles are unsigned and the updater refuses them.
      - name: Build + sign upgrade bundles
        env:
          SIGNING_KEY: ${{ secrets.DISPATCH_UPDATE_SIGNING_KEY }}
        run: |
          ver="${{ steps.ver.outputs.version }}"
          built="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          notes="https://github.com/${{ github.repository }}/releases/tag/v${ver}"
          keyfile=""
          if [ -n "$SIGNING_KEY" ]; then
            keyfile="$(mktemp)"; printf '%s' "$SIGNING_KEY" > "$keyfile"
          else
            echo "::warning::DISPATCH_UPDATE_SIGNING_KEY not set — upgrade bundles will be UNSIGNED and the updater will reject them."
          fi
          mkdir -p bundles
          for arch in x64 arm64; do
            bundle="bundles/dispatch-upgrade-${ver}-linux-${arch}.tar.gz"
            tar -czf "$bundle" -C "publish/${arch}" .
            sha="$(sha256sum "$bundle" | awk '{print $1}')"
            man="bundles/dispatch-upgrade-${ver}-linux-${arch}.manifest.json"
            printf '{"name":"dispatch","version":"%s","arch":"linux-%s","sha256":"%s","minFromVersion":"0.0.0","builtAt":"%s","notesUrl":"%s"}\n' \
              "$ver" "$arch" "$sha" "$built" "$notes" > "$man"
            if [ -n "$keyfile" ]; then
              openssl dgst -sha256 -sign "$keyfile" -out "${man}.sig" "$man"
              # Self-check: the signature must verify against the committed public key before we ship it.
              openssl dgst -sha256 -verify src/Dispatch.Core/Updates/dispatch-update-public.pem -signature "${man}.sig" "$man"
            fi
          done
          [ -n "$keyfile" ] && rm -f "$keyfile" || true
          ls -lh bundles/

      - name: Upload upgrade bundles
        uses: actions/upload-artifact@v6
        with:
          name: upgrade-bundles
          path: bundles/*
          if-no-files-found: error

  # Build + push the multi-arch container image (linux/amd64 + linux/arm64) to GHCR. One image tag
  # serves both architectures; `docker pull ghcr.io/<owner>/dispatch-smtp-relay:<ver>` works on any host.
  # Only runs for real tag releases (a dry-run workflow_dispatch skips the push).
  docker:
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # full semver + major.minor; `latest` only for stable (non-prerelease) tags.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build + push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    needs: [windows, linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Stage release files + checksums
        env:
          VER: ${{ needs.windows.outputs.version }}
        run: |
          mkdir -p release
          # Version the Windows asset names so each release's downloads are distinguishable
          # (the Linux tarball already carries the version). Names match the README.
          cp "dist/windows/DispatchSetup.exe" "release/DispatchSetup-${VER}-x64.exe"
          cp dist/linux/dispatch-*-linux.tar.gz release/
          cp dist/upgrade-bundles/* release/          # upgrade bundles + manifests + signatures
          ( cd release && sha256sum * > SHA256SUMS && cat SHA256SUMS )

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', needs.windows.outputs.version) }}
          name: Dispatch ${{ needs.windows.outputs.version }}
          draft: ${{ github.ref_type != 'tag' }}
          prerelease: ${{ contains(needs.windows.outputs.version, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/DispatchSetup-*-x64.exe
            release/dispatch-*-linux.tar.gz
            release/dispatch-upgrade-*
            release/SHA256SUMS
