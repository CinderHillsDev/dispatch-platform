name: Build

on:
  push:
  pull_request:

env:
  # The actions/* @v4 run on Node 20 (deprecated); opt them into Node 24 now (forced default 2026-06-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      # PostgreSQL service container. The Data test fixture waits up to 90s for the engine to accept
      # connections; the health-cmd gates job steps until pg_isready succeeds.
      db:
        image: postgres:17
        env:
          # Dev-only password. Override by setting the POSTGRES_PASSWORD repo/org secret; the literal is
          # only a fallback and grants nothing beyond the ephemeral CI container.
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'Dispatch_Dev_Pass123' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    env:
      # Drives the Dispatch.Data integration tests against the Postgres service container. No Database= here;
      # the fixture creates a uniquely-named database per run and drops it afterwards.
      DISPATCH_TEST_SQL: "Host=localhost;Port=5432;Username=postgres;Password=${{ secrets.POSTGRES_PASSWORD || 'Dispatch_Dev_Pass123' }}"
      # Make the integration tests fail loudly if the connection string is ever missing, instead of skipping.
      DISPATCH_REQUIRE_SQL: "1"
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/Dispatch.UI/package-lock.json

      - name: Build React UI
        working-directory: src/Dispatch.UI
        run: |
          npm ci
          npm run build

      - name: Embed UI into Dispatch.Web
        run: |
          rm -rf src/Dispatch.Web/wwwroot
          mkdir -p src/Dispatch.Web/wwwroot
          cp -r src/Dispatch.UI/dist/* src/Dispatch.Web/wwwroot/
          # Fail fast if the embed produced nothing (stale/empty dist would otherwise ship a blank dashboard).
          test -s src/Dispatch.Web/wwwroot/index.html || { echo "::error::Embedded UI is missing index.html"; exit 1; }

      - name: Restore
        run: dotnet restore Dispatch.slnx

      - name: Build
        run: dotnet build Dispatch.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Dispatch.slnx --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      # The job-level DISPATCH_TEST_SQL above pins every run to Postgres, so without this step the SQLite
      # backend would never be exercised in CI. Clearing both variables sends DatabaseFixture down its
      # SQLite path (temp file per run); DISPATCH_REQUIRE_SQL must be cleared too or the fixture throws by
      # design rather than falling back.
      #
      # This is what covers ConcurrentWriteTests on SQLite - the test that asserts concurrent writers
      # serialise on the write lock instead of failing with SQLITE_BUSY. That property depends on WAL and
      # busy_timeout being set correctly, so it needs to be verified on every change, not assumed.
      - name: Test (SQLite backend)
        env:
          DISPATCH_TEST_SQL: ""
          DISPATCH_REQUIRE_SQL: ""
        run: dotnet test tests/Dispatch.Data.Tests --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results-sqlite.trx" --results-directory TestResults

      # MariaDB and SQL Server, the two backends with no CI service container above. Started as containers
      # here so the same 64 repository tests run against all four engines - that equivalence is the whole
      # point of the provider framework, and it only holds if it is checked.
      - name: Test (MariaDB backend)
        env:
          DISPATCH_TEST_ENGINE: mysql
          DISPATCH_TEST_SQL: "Server=127.0.0.1;Port=53306;Uid=root;Pwd=Dispatch_Ci_Pass1"
          DISPATCH_REQUIRE_SQL: ""
        run: |
          docker run -d --rm --name maria-ci -e MARIADB_ROOT_PASSWORD=Dispatch_Ci_Pass1 -p 53306:3306 mariadb:11
          for _ in $(seq 1 40); do docker exec maria-ci mariadb -uroot -pDispatch_Ci_Pass1 -e "SELECT 1" >/dev/null 2>&1 && break; sleep 3; done
          dotnet test tests/Dispatch.Data.Tests --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results-mysql.trx" --results-directory TestResults
          docker rm -f maria-ci

      - name: Test (SQL Server backend)
        env:
          DISPATCH_TEST_ENGINE: sqlserver
          DISPATCH_TEST_SQL: "Server=127.0.0.1,51433;User Id=sa;Password=Dispatch_Ci_Pass1;TrustServerCertificate=True"
          DISPATCH_REQUIRE_SQL: ""
        run: |
          docker run -d --rm --name mssql-ci -e ACCEPT_EULA=Y -e MSSQL_SA_PASSWORD=Dispatch_Ci_Pass1 -p 51433:1433 mcr.microsoft.com/mssql/server:2022-latest
          for _ in $(seq 1 40); do docker exec mssql-ci /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Dispatch_Ci_Pass1 -C -Q "SELECT 1" >/dev/null 2>&1 && break; sleep 3; done
          dotnet test tests/Dispatch.Data.Tests --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results-sqlserver.trx" --results-directory TestResults
          docker rm -f mssql-ci

      # The 0.7 upgrade path, end to end against the real service: run on PostgreSQL, put mail through it,
      # migrate to bundled SQLite, restart, and confirm history, encrypted config and new delivery all
      # survive. The unit-level migrator tests cover the copy; this covers what an operator actually does.
      - name: Smoke test - PostgreSQL to SQLite upgrade
        run: tests/smoke/upgrade-postgres-to-sqlite.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore
          retention-days: 3

  # Keep em dashes out of the tree: they break Windows PowerShell parsing (a mis-decoded em-dash byte
  # becomes a smart-quote string delimiter) and the project standardizes on ASCII '-'.
  no-em-dash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Reject em dashes (use ASCII '-')
        run: |
          matches=$(grep -rlIP '\x{2014}' . --exclude-dir=.git --exclude-dir=node_modules || true)
          if [ -n "$matches" ]; then
            echo "::error::Em dash (U+2014) found - replace with an ASCII hyphen '-'. Files:"
            echo "$matches"
            exit 1
          fi
          echo "OK: no em dashes."

  # After a green Build on a working branch, rebuild the appliance from THIS validated commit so the image
  # always has the latest tested code and never races Build. workflow_run can't be used (it only fires from
  # the default branch), so we dispatch the Appliance workflow with GITHUB_TOKEN (workflow_dispatch is an
  # allowed GITHUB_TOKEN trigger). `needs: build-test` gates it on success.
  trigger-appliance:
    needs: [build-test, no-em-dash]
    if: ${{ github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'feat/relay-engine-web-providers') }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v5
      - name: Build the appliance from this validated commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run appliance.yml --ref "${{ github.ref_name }}"

  # NOTE: tagged releases (refs/tags/v*) are handled by release.yml, which builds the signed Windows
  # installer + Linux tarball and publishes a GitHub Release. This workflow only runs build + tests.
