name: Build

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      # Full SQL Server on the amd64 runner (Azure SQL Edge is retired / blocked on MCR for CI pulls).
      # Identical wire protocol / T-SQL to the local Azure SQL Edge container; the app code is unchanged.
      sql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Dispatch_Dev_Pass123"
        ports:
          - 1433:1433

    env:
      # Drives the Dispatch.Data integration tests against the SQL service container.
      DISPATCH_TEST_SQL: "Server=localhost,1433;User Id=sa;Password=Dispatch_Dev_Pass123;TrustServerCertificate=True;Encrypt=True"
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Dispatch.UI/package-lock.json

      - name: Build React UI
        working-directory: src/Dispatch.UI
        run: |
          npm ci
          npm run build

      - name: Embed UI into Dispatch.Web
        run: |
          rm -rf src/Dispatch.Web/wwwroot
          mkdir -p src/Dispatch.Web/wwwroot
          cp -r src/Dispatch.UI/dist/* src/Dispatch.Web/wwwroot/

      - name: Restore
        run: dotnet restore Dispatch.slnx

      - name: Build
        run: dotnet build Dispatch.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Dispatch.slnx --configuration Release --no-build --verbosity normal
