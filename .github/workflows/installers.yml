name: Installers

# Validates the installer artifacts on GitHub-hosted runners (free for this public repo). Non-destructive
# by default: the Windows job builds the MSI + Burn bundle (proving the WiX sources + net472 launcher
# compile) and the Linux job lints install.sh. The actual SQL-Express install + service smoke test is
# destructive (it installs SQL Server on the runner), so it only runs when dispatched with full_install=true.
on:
  workflow_dispatch:
    inputs:
      full_install:
        description: "Also run the real SQL install + service smoke test (mutates the runner)"
        type: boolean
        default: false
  push:
    paths:
      - "installer/**"
      - ".github/workflows/installers.yml"

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  # The actions/* @v4 run on Node 20 (deprecated); opt them into Node 24 now (forced default 2026-06-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Dispatch.UI/package-lock.json

      - name: Build + embed the web UI
        shell: pwsh
        run: |
          Push-Location src/Dispatch.UI; npm ci; npm run build; Pop-Location
          Remove-Item -Recurse -Force src/Dispatch.Web/wwwroot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force src/Dispatch.Web/wwwroot | Out-Null
          Copy-Item -Recurse -Force src/Dispatch.UI/dist/* src/Dispatch.Web/wwwroot/
          if (-not (Test-Path src/Dispatch.Web/wwwroot/index.html)) { throw "embedded UI missing index.html" }

      - name: Publish the service
        # Self-contained: bundle the .NET runtime so the service runs on a clean Windows box without a
        # separately-installed .NET 10 runtime (the bundle does not chain one). Matches the Linux build.
        run: dotnet publish src/Dispatch.Service -c Release -r win-x64 --self-contained true -o installer/windows/publish

      # Guard against a framework-dependent regression: the runner has .NET, so an install+smoke test would
      # still pass with a broken FDD build — but a clean customer box would fail with "You must install .NET".
      # Assert the .NET runtime is actually bundled, which a self-contained publish guarantees.
      - name: Assert publish is self-contained (bundles the .NET runtime)
        shell: pwsh
        run: |
          $missing = @('hostfxr.dll','coreclr.dll','System.Private.CoreLib.dll') |
            Where-Object { -not (Test-Path "installer/windows/publish/$_") }
          if ($missing) {
            throw "Publish is NOT self-contained (missing: $($missing -join ', ')). The service would require a separately-installed .NET runtime and fail to start on a clean machine."
          }
          Write-Host "OK: self-contained .NET runtime is bundled."

      - name: Install the WiX toolset
        shell: pwsh
        env:
          WIX_VERSION: "6.0.2"
        run: |
          dotnet tool install --global wix --version $env:WIX_VERSION
          # Extensions must match the toolset major version (the unpinned latest is v7, incompatible with v6).
          # In WiX v6 the bundle/Bal extension dll is shipped as WixToolset.BootstrapperApplications.wixext.
          wix extension add -g "WixToolset.Firewall.wixext/$env:WIX_VERSION"
          wix extension add -g "WixToolset.BootstrapperApplications.wixext/$env:WIX_VERSION"
          wix extension add -g "WixToolset.Util.wixext/$env:WIX_VERSION"

      - name: Build the MSI
        working-directory: installer/windows
        run: wix build Dispatch.wxs -arch x64 -d PublishDir=publish -ext WixToolset.Firewall.wixext -o Dispatch.msi

      - name: Build the SQL Express launcher
        run: dotnet build installer/windows/sql-express/SqlExpressLauncher.csproj -c Release

      - name: Build the bundle
        working-directory: installer/windows
        shell: pwsh
        run: |
          wix build bundle/Bundle.wxs -ext WixToolset.BootstrapperApplications.wixext -ext WixToolset.Util.wixext `
            -bindpath "SqlLauncher=sql-express/bin/Release/net472" -bindpath "Msi=." -o DispatchSetup.exe

      # CI installer builds are intentionally unsigned (signing happens only on tagged releases via
      # release.yml + Azure Artifact Signing). This artifact proves the WiX sources + launcher compile.
      # DispatchSetup.exe is the single distributable file — it embeds Dispatch.msi and chains SQL Express.
      # (The MSI is still built above to prove the WiX sources compile and to embed in the bundle.)
      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: dispatch-windows-installer
          path: installer/windows/DispatchSetup.exe
          if-no-files-found: error

      # Real end-to-end check: run the bundle (installs SQL Express + the service) and confirm the Windows
      # service starts and serves /health. Runs on every installer-path push and on manual dispatch, so a
      # service that won't start (bad config, missing files, crash on boot) fails CI instead of the customer.
      - name: Full install + smoke
        if: ${{ github.event_name == 'push' || inputs.full_install == true }}
        shell: pwsh
        run: |
          $p = Start-Process -Wait -PassThru -FilePath installer/windows/DispatchSetup.exe -ArgumentList '/quiet','/log','install.log'
          Write-Host "Bundle exit code: $($p.ExitCode)"
          $ok = $false
          foreach ($i in 1..24) {
            try { if ((Invoke-WebRequest -UseBasicParsing -SkipCertificateCheck -TimeoutSec 5 https://localhost:8420/health).StatusCode -eq 200) { $ok = $true; break } } catch {}
            Start-Sleep -Seconds 5
          }
          if (-not $ok) {
            Write-Host "=== bundle + MSI logs (Burn writes per-package install_*.log) ==="
            Get-ChildItem -Path . -Filter "install*.log" -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "----- $($_.Name) -----"; Get-Content $_.FullName | Select-Object -Last 80
            }
            Write-Host "=== SQL bootstrap log ==="; Get-Content C:\Windows\Temp\Dispatch-SqlInstall.log -ErrorAction SilentlyContinue
            Write-Host "=== Application event log (Dispatch / .NET Runtime / Application Error) ==="
            try {
              Get-WinEvent -FilterHashtable @{ LogName = 'Application'; StartTime = (Get-Date).AddMinutes(-30) } -ErrorAction SilentlyContinue |
                Where-Object { $_.ProviderName -match 'Dispatch|\.NET Runtime|Application Error' } |
                Select-Object -First 15 | Format-List TimeCreated, ProviderName, Message
            } catch {}
            Write-Host "=== Dispatch service ==="; Get-Service Dispatch -ErrorAction SilentlyContinue | Format-List Name, Status, StartType
            Write-Host "=== Dispatch app log ==="; Get-Content "$env:ProgramData\Dispatch\logs\*.log" -ErrorAction SilentlyContinue | Select-Object -Last 40
            throw "health check failed after 120s (bundle exit $($p.ExitCode))"
          }
          Write-Host "Dispatch /health OK"

  # Builds the self-contained Linux tarball and uploads it as a workflow artifact (downloadable from
  # the Actions run page). This needs NO tag and creates NO release — releases are only for permanent
  # public download links. Grab "dispatch-linux-tarball" from the run to test install.sh --prebuilt.
  linux-tarball:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Dispatch.UI/package-lock.json

      - name: Build + embed the web UI
        run: |
          ( cd src/Dispatch.UI && npm ci && npm run build )
          rm -rf src/Dispatch.Web/wwwroot
          mkdir -p src/Dispatch.Web/wwwroot
          cp -r src/Dispatch.UI/dist/* src/Dispatch.Web/wwwroot/
          test -f src/Dispatch.Web/wwwroot/index.html || { echo "embedded UI missing index.html"; exit 1; }

      - name: Publish self-contained (linux-x64)
        run: dotnet publish src/Dispatch.Service -c Release -r linux-x64 --self-contained true -o publish/linux

      # Guard against a framework-dependent regression (the runner has .NET, which would mask it at runtime).
      - name: Assert publish is self-contained (bundles the .NET runtime)
        run: |
          missing=
          for f in libcoreclr.so libhostfxr.so System.Private.CoreLib.dll; do
            [ -f "publish/linux/$f" ] || missing="$missing $f"
          done
          if [ -n "$missing" ]; then
            echo "Publish is NOT self-contained (missing:$missing) — would require a separately-installed .NET runtime." >&2
            exit 1
          fi
          echo "OK: self-contained .NET runtime is bundled."

      - name: Assemble the tarball
        run: |
          stage="dispatch-ci-linux-x64"
          mkdir -p "staging/${stage}/bin"
          cp -r publish/linux/. "staging/${stage}/bin/"
          cp installer/linux/install.sh "staging/${stage}/install.sh"
          cp installer/linux/dispatch.service "staging/${stage}/dispatch.service"
          chmod +x "staging/${stage}/install.sh" "staging/${stage}/bin/Dispatch.Service"
          tar -czf "${stage}.tar.gz" -C staging "${stage}"
          ls -lh "${stage}.tar.gz"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v6
        with:
          name: dispatch-linux-tarball
          path: dispatch-ci-linux-x64.tar.gz
          if-no-files-found: error

      # Real end-to-end check (mirrors the Windows full-install smoke): install the just-built self-contained
      # tarball exactly as a user would — install.sh --prebuilt --install-sql, which installs SQL Server
      # locally and provisions the DispatchLog DB — then confirm the systemd service starts and serves
      # /health. Runs on installer-path pushes and manual dispatch so a service that won't start (or a broken
      # SQL bootstrap) fails CI instead of the customer.
      - name: Full install + smoke
        if: ${{ github.event_name == 'push' || inputs.full_install == true }}
        env:
          SA_PW: "Ci-Smoke-Passw0rd!"
        run: |
          set -euo pipefail
          mkdir -p /tmp/extract && tar -xzf dispatch-ci-linux-x64.tar.gz -C /tmp/extract
          dir=/tmp/extract/dispatch-ci-linux-x64
          sudo "$dir/install.sh" --prebuilt "$dir/bin" --install-sql \
            --sa-password "$SA_PW" --admin-password "$SA_PW"

          ok=0
          for _ in $(seq 1 36); do
            if curl -fsSk -m 5 https://localhost:8420/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 5
          done
          if [ "$ok" != 1 ]; then
            echo "=== dispatch service ==="; sudo systemctl status dispatch --no-pager || true
            echo "=== journal ==="; sudo journalctl -u dispatch --no-pager -n 80 || true
            echo "=== app logs ==="; sudo tail -n 60 /var/log/dispatch/*.log 2>/dev/null || true
            echo "=== sql server ==="; sudo systemctl status mssql-server --no-pager 2>/dev/null || true
            echo "health check failed"; exit 1
          fi
          curl -fsSk https://localhost:8420/health; echo "  <- /health OK"

  linux-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint install.sh
        run: |
          bash -n installer/linux/install.sh
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck -S warning installer/linux/install.sh || true
          else
            echo "shellcheck not installed — syntax check only"
          fi

      # The end-to-end install + "service actually runs" smoke lives in the linux-tarball job below — it
      # installs the real self-contained tarball (install.sh --prebuilt) against a SQL container and checks
      # /health, mirroring the Windows full-install smoke. This job stays a fast lint of install.sh.
